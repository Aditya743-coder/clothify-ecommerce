services:
  - type: web
    name: clothi-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node seed.js && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
